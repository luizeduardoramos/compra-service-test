name: Java CI with Gradle

on:
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'corretto'
        cache: 'gradle'

    - name: Run Gradle Tests
      run: |
        chmod +x ./gradlew
        ./gradlew clean test --no-daemon
